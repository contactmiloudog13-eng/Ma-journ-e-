<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap');
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: #FAF6EF;
  font-family: 'Manrope', sans-serif;
  color: #2E2440;
  padding: max(24px, env(safe-area-inset-top)) 16px 60px;
  -webkit-tap-highlight-color: transparent;
}
.container { max-width: 480px; margin: 0 auto; }
.header-row { display: flex; align-items: center; margin-bottom: 4px; }
.header-left { display: flex; align-items: center; gap: 10px; }
.paw-icon { color: #3B2B54; display: flex; }
h1.title { font-family: 'Fraunces', serif; font-weight: 700; font-size: 28px; color: #3B2B54; margin: 0; }
.sub-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; margin-top: 6px; }
.date-text { color: #8a7fa0; font-size: 14px; text-transform: capitalize; }
.refresh-btn { display: flex; align-items: center; background: none; border: none; color: #3B2B54; font-weight: 700; font-size: 13px; cursor: pointer; padding: 4px 6px; font-family: inherit; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
.stat-card { background: #fff; border: 1px solid #EDE6D8; border-radius: 16px; padding: 16px; box-shadow: 0 1px 3px rgba(59,43,84,0.04); }
.stat-icon { margin-bottom: 10px; }
.stat-value { font-size: 26px; font-weight: 800; color: #2E2440; font-family: 'Fraunces', serif; }
.stat-label { font-size: 12.5px; color: #9a8fae; margin-top: 2px; }
.add-dog-btn { width: 100%; display: flex; align-items: center; justify-content: center; background: #3B2B54; color: #fff; border: none; border-radius: 14px; padding: 13px 0; font-size: 14.5px; font-weight: 700; cursor: pointer; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(59,43,84,0.25); font-family: inherit; }
.card { background: #fff; border: 1px solid #EDE6D8; border-radius: 18px; padding: 18px; margin-bottom: 16px; }
.card-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-header-row.clickable { cursor: pointer; margin-bottom: 0; user-select: none; }
.card-header-row.clickable.is-open { margin-bottom: 12px; }
.card-title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 16.5px; color: #3B2B54; display: flex; align-items: center; }
.header-right { display: flex; align-items: center; gap: 8px; }
.badge { font-size: 12.5px; color: #8a7fa0; background: #F4EFE2; padding: 4px 10px; border-radius: 999px; font-weight: 600; }
.chevron { display: flex; color: #b3a9c2; transition: transform 0.2s ease; flex-shrink: 0; }
.chevron-open { transform: rotate(180deg); }
.other-departures-picker { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
.other-departures-picker input { flex: 1; }
.clear-date-btn { background: none; border: 1px solid #E4DCEF; border-radius: 10px; color: #9a8fae; cursor: pointer; padding: 10px; display: flex; }
.empty-text { color: #b3a9c2; font-size: 13.5px; margin: 4px 0 2px; }
.list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
.appel-item { display: flex; flex-direction: column; gap: 8px; padding: 9px 10px; border-radius: 10px; cursor: pointer; background: #FAF6EF; }
.row-top { display: flex; align-items: center; gap: 10px; }
.payment-row { display: flex; gap: 8px; }
.payment-row-indent { display: flex; gap: 8px; margin-left: 30px; }
.pay-badge { border: 1px solid #E4DCEF; border-radius: 999px; padding: 4px 10px; font-size: 11.5px; font-weight: 700; cursor: pointer; font-family: 'Manrope', sans-serif; }
.pay-badge-off { background: #FDF3F1; color: #c07a5e; border-color: #F2DCD3; }
.pay-badge-on { background: #E9F3E8; color: #4f8f4a; border-color: #CFE7CC; }
.deposit-badge-on { background: #EEF0FB; color: #4a56c4; border-color: #D6D9F5; }
.toggle-form-btn { flex: 1; border: 1px solid #E4DCEF; border-radius: 10px; padding: 10px 0; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Manrope', sans-serif; background: #fff; }
.checkbox { width: 20px; height: 20px; border-radius: 6px; border: 2px solid #d8cfe6; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.checkbox-on { background: #3B2B54; border-color: #3B2B54; }
.dog-name { font-weight: 700; font-size: 14.5px; flex: 1; color: #2E2440; }
.dog-dates { font-size: 12px; color: #a89bc2; white-space: nowrap; }
.row-item { display: flex; flex-direction: column; gap: 8px; padding: 8px 4px; border-bottom: 1px solid #F4EFE2; }
.trash-btn { background: none; border: none; color: #c9a99a; cursor: pointer; padding: 4px; display: flex; }
.icon-btn { background: none; border: none; color: #9a8fae; cursor: pointer; display: flex; }
.form-grid { display: flex; flex-direction: column; gap: 12px; }
.date-row { display: flex; gap: 10px; }
label.field { display: flex; flex-direction: column; gap: 6px; font-size: 12.5px; color: #8a7fa0; font-weight: 600; flex: 1; }
input { border: 1px solid #E4DCEF; border-radius: 10px; padding: 10px 12px; font-size: 14px; font-family: 'Manrope', sans-serif; color: #2E2440; outline: none; background: #FDFCFA; width: 100%; }
.error-text { color: #c05656; font-size: 12.5px; font-weight: 600; }
.price-preview { background: #F4F0FA; border: 1px solid #E4DCEF; border-radius: 10px; padding: 10px 14px; font-size: 13.5px; color: #3B2B54; margin-bottom: 6px; }
.price-badge { color: #3B2B54; font-weight: 700; font-size: 11.5px; background: #F4F0FA; border: 1px solid #E4DCEF; border-radius: 999px; padding: 4px 10px; font-family: 'Manrope', sans-serif; }
.submit-btn { background: #3B2B54; color: #fff; border: none; border-radius: 10px; padding: 11px 0; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 2px; font-family: inherit; }
.inline-form { display: flex; gap: 8px; margin-top: 12px; }
.add-btn { background: #3B2B54; color: #fff; border: none; border-radius: 10px; padding: 0 14px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
.add-link { display: flex; align-items: center; background: none; border: none; color: #3B2B54; font-weight: 700; font-size: 13px; cursor: pointer; margin-top: 10px; padding: 0; font-family: inherit; }
svg { display: block; }
</style>
</head>

// ---------- date helpers ----------
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function formatFR(dateStr) {
  if (!dateStr) return "";
  const [y, m, d] = dateStr.split("-").map(Number);
  const date = new Date(y, m - 1, d);
  return date.toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long" });
}
function shortFR(dateStr) {
  if (!dateStr) return "";
  const [y, m, d] = dateStr.split("-").map(Number);
  const date = new Date(y, m - 1, d);
  return date.toLocaleDateString("fr-FR", { day: "numeric", month: "short" });
}
function uid() { return Math.random().toString(36).slice(2, 10); }
function esc(str) {
  return String(str ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// ---------- tarifs & calcul automatique du prix (pension) ----------
const RATE_NUIT = 25;       // prix d'une nuit de pension
const REMISE_2_CHIENS = 0.10; // -10% à partir de 2 chiens (même réservation)
const REMISE_3_CHIENS = 0.15; // -15% à partir de 3 chiens (même réservation)
const TARIF_ARRIVEE_TARDIVE = 10; // 1ère nuit à 10€ si arrivée entre 13h30 et 19h
const TARIF_DEMI_JOURNEE = 10;    // départ entre 9h et 13h

function parseLocalDate(dateStr) {
  if (!dateStr) return null;
  const [y, m, d] = dateStr.split("-").map(Number);
  return new Date(y, m - 1, d);
}

// Calcule le prix total d'un séjour selon la logique de tarification.
// start/end : "AAAA-MM-JJ" ; arrivalTime/departureTime : "HH:MM" (optionnels) ; dogsCount : 1/2/3
// nightlyRate : tarif par nuit choisi (0 à 25€) — si absent/invalide, on retombe sur RATE_NUIT.
function computeDogPrice(start, end, arrivalTime, departureTime, dogsCount, nightlyRate) {
  const d1 = parseLocalDate(start);
  const d2 = parseLocalDate(end);
  if (!d1 || !d2) return 0;
  const nights = Math.max(0, Math.round((d2 - d1) / 86400000));

  const parsedRate = parseFloat(nightlyRate);
  const rate = !isNaN(parsedRate) ? Math.min(25, Math.max(0, parsedRate)) : RATE_NUIT;

  let arriveeTardive = false;
  if (arrivalTime) {
    const [ah, am] = arrivalTime.split(":").map(Number);
    const mins = ah * 60 + (am || 0);
    arriveeTardive = mins >= (13 * 60 + 30) && mins < (19 * 60);
  }

  let extraJournee = false, extraDemi = false;
  if (departureTime) {
    const dh = Number(departureTime.split(":")[0]);
    if (dh >= 14) extraJournee = true;
    else if (dh > 8 && dh <= 13) extraDemi = true;
  }

  const nb = parseInt(dogsCount) || 1;
  const discRate = nb >= 3 ? REMISE_3_CHIENS : nb === 2 ? REMISE_2_CHIENS : 0;
  const disc = (v) => Math.round(v * (1 - discRate));

  let total = 0;
  if (nights > 0) {
    const prix1 = arriveeTardive ? TARIF_ARRIVEE_TARDIVE : rate;
    total += disc(prix1 + Math.max(0, nights - 1) * rate);
  }
  if (extraJournee) total += disc(rate);
  if (extraDemi) total += disc(TARIF_DEMI_JOURNEE);
  return total;
}

  } catch (e) { console.error("Erreur de sauvegarde", e); }
}

// re-render while preserving focus/cursor position on inputs
function rerender(focusId) {
  const active = document.activeElement;
  const id = focusId || (active && active.id);
  let start = null;
  let end = null;
  if (!focusId && active) {
    // Les inputs type="date"/"time"/"number" lèvent une erreur si on lit
    // selectionStart/selectionEnd : on protège cette lecture.
    try {
      if (typeof active.selectionStart === "number") {
        start = active.selectionStart;
        end = active.selectionEnd;
      }
    } catch (e) { /* ce type de champ ne supporte pas la sélection */ }
  }
  // render() remplace tout le HTML de l'app : ça peut faire sauter le scroll.
  // On ne mémorise/restaure la position que pour les re-rendus "normaux"
  // (saisie, coches, etc.) — pas quand on ouvre volontairement un nouveau
  // champ (focusId fourni), où on veut au contraire que la page défile
  // naturellement vers ce champ.
  const preserveScroll = !focusId;
  const scrollX = preserveScroll ? window.scrollX : null;
  const scrollY = preserveScroll ? window.scrollY : null;
  persist();
  render();
  // Sur mobile, redonner le focus à un champ date/heure via JS rouvre le
  // sélecteur natif (Android en particulier) : ça provoque le flash
  // "le champ disparaît puis revient". Ces champs n'ont de toute façon pas
  // besoin de garder le focus une fois une date choisie, donc on saute la
  // restauration du focus pour eux.
  const noRefocusTypes = ["date", "time", "month", "week"];
  if (id) {
    const el = document.getElementById(id);
    if (el && !noRefocusTypes.includes(el.type)) {
      if (preserveScroll) {
        // preventScroll: true évite que focus() ne fasse défiler la page
        // vers l'élément, même s'il est déjà visible.
        try { el.focus({ preventScroll: true }); } catch (e) { el.focus(); }
      } else {
        el.focus();
      }
      if (start != null && el.setSelectionRange) {
        try { el.setSelectionRange(start, end); } catch (e) {}
      } else if (el.setSelectionRange && typeof el.value === "string") {
        try { el.setSelectionRange(el.value.length, el.value.length); } catch (e) {}
      }
    }
  }
  if (preserveScroll) window.scrollTo(scrollX, scrollY);
}

function refreshLiveFields(field) {
  if (["newStart", "newEnd", "newArrivalTime", "newDepartureTime"].includes(field)) {
    const el = document.getElementById("newPricePreview");
    if (el) el.textContent = computeDogPrice(state.newStart, state.newEnd, state.newArrivalTime, state.newDepartureTime, state.newDogsCount, state.newDailyRate) + "€";
  }
  if (["editStart", "editEnd", "editArrivalTime", "editDepartureTime"].includes(field)) {
    const el = document.getElementById("editPricePreview");
    if (el) el.textContent = computeDogPrice(state.editStart, state.editEnd, state.editArrivalTime, state.editDepartureTime, state.editDogsCount, state.editDailyRate) + "€";
  }
  if (field === "otherDeparturesDate") {
    const clearWrap = document.getElementById("otherDeparturesClearWrap");
    if (clearWrap) {
      clearWrap.innerHTML = state.otherDeparturesDate
        ? `<button type="button" class="clear-date-btn" title="Voir tous les départs à venir" onclick="updateField('otherDeparturesDate', '')">${ICONS.x(15)}</button>`
        : "";
    }
    const listWrap = document.getElementById("otherDeparturesListWrap");
    if (listWrap) {
      const today = state.today;
      const futureDepartures = state.dogs.filter((d) => d.end > today).sort((a, b) => a.end.localeCompare(b.end));
      const otherDepartures = state.otherDeparturesDate
        ? futureDepartures.filter((d) => d.end === state.otherDeparturesDate)
        : futureDepartures;
      listWrap.innerHTML = otherDepartures.length === 0
        ? `<p class="empty-text">${state.otherDeparturesDate ? "Aucun départ ce jour-là." : "Aucun départ prévu dans les jours qui suivent."}</p>`
        : `<ul class="list">${otherDepartures.map((d) => `

              </div>
              ${paymentBadges(d, false)}
            </li>`).join("")}</ul>`;
    }
  }
  // visitDate : pas d'aperçu en direct, seulement utilisé à la soumission du formulaire.
}
window.submitAddDog = function (e) {
  e.preventDefault();

  if (!name) { state.formError = "Entre le prénom du chien."; rerender(); return; }

  state.dogs.push({
    id: uid(),
    name,
    start: state.newStart,
    end: state.newEnd,
    checkins: {},
    arrivalConfirmed: false,
    departureConfirmed: false,

        <div class="date-row">
          <button type="button" class="toggle-form-btn ${state.newPaid ? "pay-badge-on" : "pay-badge-off"}" onclick="updateField('newPaid', ${!state.newPaid})">${state.newPaid ? "✓ Payé" : "Non payé"}</button>
          <button type="button" class="toggle-form-btn ${state.newDeposit ? "deposit-badge-on" : "pay-badge-off"}" onclick="updateField('newDeposit', ${!state.newDeposit})">${state.newDeposit ? "✓ Acompte" : "Sans acompte"}</button>
        </div>
        ${state.newDeposit ? `
        <label class="field">Montant de l'acompte (€)
          <input id="newDepositAmount" type="number" min="0" step="0.01" inputmode="decimal" value="${esc(state.newDepositAmount)}" oninput="updateField('newDepositAmount', this.value)" placeholder="ex. 30" />
        </label>` : ""}
        ${state.formError ? `<div class="error-text">${esc(state.formError)}</div>` : ""}
        <button type="submit" class="submit-btn">Enregistrer le chien</button>
      </form>
    </div>` : "";

  const editDog = state.editDogId ? state.dogs.find((d) => d.id === state.editDogId) : null;
  const editDogForm = editDog ? `
    <div class="card">
      <div class="card-header-row">
        <span class="card-title">Modifier ${esc(editDog.name)}</span>
        <button class="icon-btn" onclick="closeEditDog()">${ICONS.x(18)}</button>
      </div>
      <form class="form-grid" onsubmit="submitEditDog(event)">
        <label class="field">Prénom du chien
          <input id="editName" value="${esc(state.editName)}" oninput="updateField('editName', this.value)" placeholder="ex. Milo" />
        </label>
        <div class="date-row">
          <label class="field">Arrivée
            <input id="editStart" type="date" value="${esc(state.editStart)}" onchange="updateFieldDeferred('editStart', this.value)" />
          </label>
          <label class="field">Départ
            <input id="editEnd" type="date" value="${esc(state.editEnd)}" onchange="updateFieldDeferred('editEnd', this.value)" />
          </label>
        </div>
        <div class="date-row">
          <label class="field">Heure d'arrivée
            <input id="editArrivalTime" type="time" value="${esc(state.editArrivalTime)}" onchange="updateFieldDeferred('editArrivalTime', this.value)" />
          </label>
          <label class="field">Heure de départ
            <input id="editDepartureTime" type="time" value="${esc(state.editDepartureTime)}" onchange="updateFieldDeferred('editDepartureTime', this.value)" />
          </label>
        </div>
        <label class="field">Nombre de chiens (même réservation)
          <select id="editDogsCount" onchange="updateField('editDogsCount', this.value)">
            <option value="1" ${state.editDogsCount === "1" ? "selected" : ""}>1 chien</option>
            <option value="2" ${state.editDogsCount === "2" ? "selected" : ""}>2 chiens (−10%)</option>
            <option value="3" ${state.editDogsCount === "3" ? "selected" : ""}>3 chiens ou + (−15%)</option>
          </select>
        </label>
        <label class="field">💶 Tarif par nuit (€)
          <input id="editDailyRate" type="number" min="0" max="25" step="0.5" inputmode="decimal"
            value="${esc(state.editDailyRate)}" oninput="updateField('editDailyRate', this.value)" />
        </label>
        <div class="price-preview">Prix total estimé : <strong id="editPricePreview">${computeDogPrice(state.editStart, state.editEnd, state.editArrivalTime, state.editDepartureTime, state.editDogsCount, state.editDailyRate)}€</strong></div>
        <div class="date-row">
          <button type="button" class="toggle-form-btn ${state.editPaid ? "pay-badge-on" : "pay-badge-off"}" onclick="updateField('editPaid', ${!state.editPaid})">${state.editPaid ? "✓ Payé" : "Non payé"}</button>
          <button type="button" class="toggle-form-btn ${state.editDeposit ? "deposit-badge-on" : "pay-badge-off"}" onclick="updateField('editDeposit', ${!state.editDeposit})">${state.editDeposit ? "✓ Acompte" : "Sans acompte"}</button>
        </div>
        ${state.editDeposit ? `
        <label class="field">Montant de l'acompte (€)
          <input id="editDepositAmount" type="number" min="0" step="0.01" inputmode="decimal" value="${esc(state.editDepositAmount)}" oninput="updateField('editDepositAmount', this.value)" placeholder="ex. 30" />
        </label>` : ""}
        ${state.editError ? `<div class="error-text">${esc(state.editError)}</div>` : ""}
        <button type="submit" class="submit-btn">Enregistrer les modifications</button>
      </form>
    </div>` : "";

  const appelList = presentDogs.length === 0
    ? `<p class="empty-text">Aucun chien enregistré. Ajoutez-en un pour commencer l'appel.</p>`
    : `<ul class="list">${presentDogs.map((d) => {
        const checked = !!(d.checkins && d.checkins[today]);
        return `<li class="appel-item" onclick="toggleCheckin('${d.id}')">
          <div class="row-top">
            <span class="checkbox ${checked ? "checkbox-on" : ""}">${checked ? ICONS.check(13, "#fff") : ""}</span>
            <span class="dog-name">${esc(d.name)}</span>
            <span class="dog-dates">${shortFR(d.start)} → ${shortFR(d.end)}</span>
            ${editButton(d)}
          </div>
          ${paymentBadges(d, true)}
        </li>`;
      }).join("")}</ul>`;

  const arrivalsList = arrivalsToday.length === 0
    ? `<p class="empty-text">Aucune arrivée aujourd'hui.</p>`
    : `<ul class="list">${arrivalsToday.map((d) => `
        <li class="appel-item" onclick="toggleArrivalConfirm('${d.id}')" title="Confirmer l'arrivée">
          <div class="row-top">
            <span class="checkbox">${ICONS.check(13, "#fff")}</span>
            <span class="dog-name">${esc(d.name)}</span>
            <span class="dog-dates">reste jusqu'au ${shortFR(d.end)}</span>
            ${editButton(d)}
            <button class="trash-btn" onclick="event.stopPropagation(); removeDog('${d.id}')" title="Supprimer">${ICONS.trash(15)}</button>
          </div>
          ${paymentBadges(d, true)}
        </li>`).join("")}</ul>`;

  const departuresList = departuresToday.length === 0
    ? `<p class="empty-text">Aucun départ aujourd'hui.</p>`
    : `<ul class="list">${departuresToday.map((d) => `
        <li class="appel-item" onclick="toggleDepartureConfirm('${d.id}')" title="Confirmer le départ">
          <div class="row-top">
            <span class="checkbox">${ICONS.check(13, "#fff")}</span>
            <span class="dog-name">${esc(d.name)}</span>
            <span class="dog-dates">arrivé le ${shortFR(d.start)}</span>
            ${editButton(d)}
            <button class="trash-btn" onclick="event.stopPropagation(); removeDog('${d.id}')" title="Supprimer">${ICONS.trash(15)}</button>
          </div>
          ${paymentBadges(d, true)}
        </li>`).join("")}</ul>`;


  const otherDeparturesPicker = `<div class="other-departures-picker" onclick="stop(event)">
      <input type="date" value="${esc(state.otherDeparturesDate)}" onchange="updateFieldDeferred('otherDeparturesDate', this.value)" />
      <span id="otherDeparturesClearWrap">${state.otherDeparturesDate ? `<button type="button" class="clear-date-btn" title="Voir tous les départs à venir" onclick="updateField('otherDeparturesDate', '')">${ICONS.x(15)}</button>` : ""}</span>
    </div>`;

  const otherDeparturesList = `<div id="otherDeparturesListWrap">${otherDepartures.length === 0
    ? `<p class="empty-text">${state.otherDeparturesDate ? "Aucun départ ce jour-là." : "Aucun départ prévu dans les jours qui suivent."}</p>`
    : `<ul class="list">${otherDepartures.map((d) => `
        <li class="row-item">
          <div class="row-top">
            <span class="dog-name">${esc(d.name)}</span>
            <span class="dog-dates">part le ${shortFR(d.end)}</span>
            ${editButton(d)}
            <button class="trash-btn" onclick="removeDog('${d.id}')">${ICONS.trash(15)}</button>
          </div>
          ${paymentBadges(d, false)}
        </li>`).join("")}</ul>`}</div>`;


  const upcomingList = upcomingArrivals.length === 0
    ? `<p class="empty-text">Aucune arrivée prévue dans les jours qui suivent.</p>`
    : `<ul class="list">${upcomingArrivals.map((d) => `
        <li class="row-item">
          <div class="row-top">
            <span class="dog-name">${esc(d.name)}</span>
            <span class="dog-dates">arrive le ${shortFR(d.start)} → ${shortFR(d.end)}</span>
            ${editButton(d)}
            <button class="trash-btn" onclick="removeDog('${d.id}')">${ICONS.trash(15)}</button>
          </div>
          ${paymentBadges(d, false)}
        </li>`).join("")}</ul>`;

  const visitsList = (state.visits.length === 0 && !state.showAddVisit)
    ? `<p class="empty-text">Aucune visite prévue.</p>`
    : `<ul class="list">${state.visits.slice().sort((a, b) => a.date.localeCompare(b.date)).map((v) => `
        <li class="row-item">
          <span class="dog-name">${esc(v.client)}</span>
          <span class="dog-dates">${shortFR(v.date)}</span>
          <button class="trash-btn" onclick="removeVisit('${v.id}')">${ICONS.trash(15)}</button>
        </li>`).join("")}</ul>`;

  const visitForm = state.showAddVisit
    ? `<form class="inline-form" onsubmit="submitAddVisit(event)">
        <input id="visitClient" style="flex:1" placeholder="Client / adresse..." value="${esc(state.visitClient)}" oninput="updateField('visitClient', this.value)" />
        <input id="visitDate" type="date" value="${esc(state.visitDate)}" onchange="updateFieldDeferred('visitDate', this.value)" />
        <button type="submit" class="add-btn">Ajouter</button>
      </form>`
    : `<button class="add-link" onclick="openAddVisit()">${ICONS.plus(14)}Ajouter une visite</button>`;

  document.getElementById("app").innerHTML = `
    <div class="container">
      <div class="header-row">
        <div class="header-left">
          <span class="paw-icon">${ICONS.paw(26, "#3B2B54")}</span>
          <h1 class="title">Ma journée</h1>
        </div>
      </div>
      <div class="sub-row">
        <span class="date-text">${formatFR(today)}</span>
        <button class="refresh-btn" onclick="refreshToday()">${ICONS.refresh(14)}&nbsp;Actualiser</button>
      </div>

      <div class="stats-grid">
        ${statCard(ICONS.droplet(20, "#4a90d9", "#cfe4f7"), arrivalsToday.length, "Arrivées aujourd'hui")}
        ${statCard(ICONS.droplet(20, "#c97b4a", "#f4dcc8"), departuresToday.length, "Départs aujourd'hui")}
        ${statCard(ICONS.paw(20, "#3b2b54"), `${presentDogs.length}/${state.dogs.length}`, "Chiens présents")}
        ${statCard(ICONS.home(20, "#7a6a4a"), visitsToday.length, "Visites à domicile")}
      </div>

      <button class="add-dog-btn" onclick="openAddDog()">${ICONS.plus(16)}&nbsp;Ajouter un chien</button>

      ${addDogForm}
      ${editDogForm}

      ${cardBlock(
        "appel",
        `${ICONS.clipboard(16)}&nbsp;L'appel`,
        `<span class="badge">${checkedInCount} / ${presentDogs.length} présents</span>`,
        appelList
      )}

      ${cardBlock(
        "arrivals",
        `${ICONS.droplet(15, "#4a90d9")}&nbsp;Arrivées du jour (${arrivalsToday.length})`,
        "",
        arrivalsList
      )}

      ${cardBlock(
        "upcoming",
        `${ICONS.calendar(15, "#5a8a5a")}&nbsp;Arrivées à venir (${upcomingArrivals.length})`,
        "",
        upcomingList
      )}

      ${cardBlock(
        "departures",
        `${ICONS.droplet(15, "#c97b4a")}&nbsp;Départs du jour (${departuresToday.length})`,
        "",
        departuresList
      )}

      ${cardBlock(
        "otherDepartures",
        `${ICONS.calendar(15, "#c97b4a")}&nbsp;Départs des autres jours`,
        `<span class="badge">${futureDepartures.length}</span>`,
        otherDeparturesPicker + otherDeparturesList
      )}

      ${cardBlock(
        "visits",
        `${ICONS.home(15, "#7a6a4a")}&nbsp;Visites à domicile (${state.visits.length})`,
        "",
        visitsList + visitForm
      )}
    </div>
  `;
}

load();
render();
</script>
</body>
</html>
